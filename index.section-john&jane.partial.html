<section class="john-jane">
  <div class="john-jane__inner container">
    <h2 id="john-jane-heading" class="john-jane__title">
      #johnandjane.
    </h2>

    <div class="john-jane__decoration">
      <img src="img/john&jane-decorative.svg" alt="decorative flourish" class="img-fluid" />
    </div>

    <p class="john-jane__subtitle">
      On our Instagram, we share inspiring photos and show how we see our
      wedding. Click on the hashtag to see more.
    </p>

    <!-- Bootstrap Carousel -->
    <div id="johnJaneCarousel" class="john-jane__carousel carousel slide">
      <div class="carousel-inner">

        <div class="carousel-item active">
          <img src="img/ring-box.png" class="d-block w-100 img-fluid john-jane__image" alt="Ring in box" />
        </div>

        <div class="carousel-item">
          <img src="img/couple-wedding-kiss.png" class="d-block w-100 img-fluid john-jane__image"
            alt="Couple kissing" />
        </div>

        <div class="carousel-item">
          <img src="img/wedding-table.png" class="d-block w-100 img-fluid john-jane__image" alt="Wedding table" />
        </div>

        <div class="carousel-item">
          <img src="img/hand-on-hand-wedding-rings.png" class="d-block w-100 img-fluid john-jane__image"
            alt="Hands holding with rings" />
        </div>

        <div class="carousel-item">
          <img src="img/darkhaired-woman-bouqet.png" class="d-block w-100 img-fluid john-jane__image"
            alt="Dark-haired woman with bouquet" />
        </div>

        <div class="carousel-item">
          <img src="img/wedding-cake.png" class="d-block w-100 img-fluid john-jane__image" alt="Wedding cake" />
        </div>

        <div class="carousel-item">
          <img src="img/couple-in-forrest.png" class="d-block w-100 img-fluid john-jane__image"
            alt="Couple in forest" />
        </div>

      </div>

      <!-- Prev -->
      <button class="carousel-control-prev john-jane__nav john-jane__nav--prev" type="button"
        data-bs-target="#johnJaneCarousel" data-bs-slide="prev" aria-label="Previous photo">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <!-- Next -->
      <button class="carousel-control-next john-jane__nav john-jane__nav--next" type="button"
        data-bs-target="#johnJaneCarousel" data-bs-slide="next" aria-label="Next photo">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- Only for john-jane carousel -->
    <script src="js/john-jane-carousel.js"></script>
  </div>
</section>
